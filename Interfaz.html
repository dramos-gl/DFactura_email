<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* variables para el Tema Oscuro (Por defecto) */
    :root {
      --bg-dark: #0f172a;       /* Slate 900 */
      --bg-card: #1e293b;       /* Slate 800 */
      --bg-hover: #334155;      /* Slate 700 */
      --border-color: #334155;  /* Slate 700 */
      --text-main: #f8fafc;     /* Slate 50 */
      --text-muted: #94a3b8;    /* Slate 400 */
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
      --modal-overlay-bg: rgba(15, 23, 42, 0.75);
      
      /* Colores de acento corporativos */
      --color-primary: #3b82f6; /* Azul primario */
      --color-primary-hover: #2563eb;
      --color-cancun: #f43f5e;  /* Rosa/Rojo suave */
      --color-playa: #10b981;   /* Verde esmeralda suave */
      --color-tulum: #06b6d4;   /* Cian suave */
      --color-legacy: #f59e0b;  /* Ámbar */
    }

    /* Variables para el Tema Claro */
    body.light-theme {
      --bg-dark: #f8fafc;       /* Slate 50 */
      --bg-card: #ffffff;       /* Blanco */
      --bg-hover: #f1f5f9;      /* Slate 100 */
      --border-color: #e2e8f0;  /* Slate 200 */
      --text-main: #0f172a;     /* Slate 900 */
      --text-muted: #64748b;    /* Slate 500 */
      --shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
      --modal-overlay-bg: rgba(15, 23, 42, 0.4);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    /* Cabecera */
    .header {
      position: relative;
      text-align: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 24px;
      transition: border-color 0.3s ease;
    }
    .header h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text-main);
    }
    .header p {
      margin: 6px 0 0 0;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    /* Botón de control de Tema (Esquina superior derecha) */
    .theme-toggle {
      position: absolute;
      top: -2px;
      right: 0;
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .theme-toggle:hover {
      background-color: var(--bg-hover);
      border-color: var(--text-muted);
    }
    .theme-toggle svg {
      width: 16px;
      height: 16px;
    }
    /* Ocultar iconos dependiendo del tema activo */
    .theme-toggle .sun-icon { display: block; }
    .theme-toggle .moon-icon { display: none; }
    body.light-theme .theme-toggle .sun-icon { display: none; }
    body.light-theme .theme-toggle .moon-icon { display: block; }

    /* Sección de etiquetas */
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.3s ease;
    }

    /* Botonera Base */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 14px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      background-color: var(--bg-card);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow);
      gap: 12px;
    }
    
    .btn:hover {
      background-color: var(--bg-hover);
      transform: translateY(-1px);
    }
    
    .btn:active {
      transform: translateY(0px);
    }

    .btn:disabled {
      background-color: var(--bg-card) !important;
      color: var(--text-muted) !important;
      border-color: var(--border-color) !important;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
      opacity: 0.5;
    }

    .btn:disabled svg {
      opacity: 0.5;
    }

    /* Botón Acción Consolidada (Destacado Primario) */
    .btn-all {
      background-color: var(--color-primary);
      border-color: var(--color-primary);
      color: #ffffff;
      font-weight: 600;
    }
    .btn-all:hover {
      background-color: var(--color-primary-hover);
      border-color: var(--color-primary-hover);
    }
    body.light-theme .btn-all {
      color: #ffffff; /* Asegurar contraste en tema claro */
    }

    /* Iconos SVG alineados */
    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      transition: stroke 0.2s ease;
    }

    /* Bordes e Indicadores Sutiles para Municipios */
    .btn-municipality {
      border-left: 4px solid var(--border-color);
    }
    .btn-cancun { border-left-color: var(--color-cancun); }
    .btn-playa { border-left-color: var(--color-playa); }
    .btn-tulum { border-left-color: var(--color-tulum); }
    
    .btn-legacy {
      border-left: 4px solid var(--color-legacy);
    }

    /* Contenedor de Carga / Spinner */
    .loader-container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg-card);
      border-radius: 12px;
      margin-top: 20px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      animation: fadeIn 0.2s ease-out;
    }
    .spinner {
      border: 3px solid var(--border-color);
      border-top: 3px solid var(--color-primary);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      animation: spin 0.8s linear infinite;
    }
    .loader-text {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.5;
      margin-top: 14px;
      color: var(--text-muted);
      text-align: center;
      white-space: pre-line;
    }

    /* Barra de progreso interactiva */
    .progress-bar-container {
      width: 100%;
      background-color: var(--border-color);
      border-radius: 4px;
      margin-top: 14px;
      overflow: hidden;
      display: none;
    }
    .progress-bar-fill {
      height: 6px;
      width: 0%;
      background-color: var(--color-primary);
      transition: width 0.3s ease;
    }

    /* Modales y Alertas Personalizados */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--modal-overlay-bg);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
      transition: background-color 0.3s ease;
    }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      width: 100%;
      max-width: 320px;
      padding: 20px;
      box-shadow: var(--shadow);
      animation: scaleUp 0.15s cubic-bezier(0.16, 1, 0.3, 1);
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    .modal-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }
    .modal-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .modal-btn {
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-main);
      transition: all 0.1s ease;
    }
    .modal-btn-primary {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #ffffff;
    }
    .modal-btn-primary:hover {
      background: var(--color-primary-hover);
    }
    .modal-btn:hover:not(.modal-btn-primary) {
      background: var(--bg-hover);
    }

    /* Animaciones */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleUp {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Utilidades de espaciado */
    .mt-16 { margin-top: 16px; }
  </style>
</head>
<body>

  <!-- Cabecera de Consola -->
  <div class="header">
    <h3>GAS Control</h3>
    <p>Gestión de Recaudación Municipal</p>
    
    <!-- Switch de cambio de tema -->
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema de color">
      <!-- Icono Sol (Se muestra en tema oscuro para cambiar a claro) -->
      <svg class="sun-icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
      </svg>
      <!-- Icono Luna (Se muestra en tema claro para cambiar a oscuro) -->
      <svg class="moon-icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
      </svg>
    </button>
  </div>

  <!-- Sección: Históricos -->
  <div class="section-label">Mantenimiento de Históricos</div>
  <button id="btn-legacy" class="btn btn-legacy" onclick="confirmarOrganizacion()">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#f59e0b">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.82c-.068-.387-.51-.568-.83-.322l-1.66 1.282a.75.75 0 00-.11.996l1.01 1.491c.219.322.68.327.904.01l1.19-1.685a.81.81 0 00-.024-.961l-.49-.811zM14.017 21v-1.44a1.44 1.44 0 011.017-1.378l1.417-.472c.403-.134.57-.616.34-.957l-.903-1.332a.75.75 0 00-.967-.225l-1.455.728a1.44 1.44 0 01-1.285 0l-1.455-.728a.75.75 0 00-.967.225l-.903 1.332c-.23.341-.063.823.34.957l1.417.472c.418.14.717.53.717.972V21m3.75-13.5v10.05a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 17.55V6.75A2.25 2.25 0 016.75 4.5h3.181a2.25 2.25 0 011.591.659l2.208 2.209a3 3 0 002.122.879H17.25a2.25 2.25 0 012.25 2.25z" />
    </svg>
    Organizar Carpeta Descargados
  </button>

  <button id="btn-backfill" class="btn btn-legacy" onclick="confirmarBackfill()">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#f59e0b">
      <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
    </svg>
    Actualizar Claves, Fechas y Refs
  </button>

  <!-- Sección: Acción Gmail -->
  <div class="section-label mt-16">Acción Consolidada Gmail</div>
  <button id="btn-todo" class="btn btn-all" onclick="procesarTodo()">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
    </svg>
    Procesar Todas las Facturas
  </button>

  <!-- Sección: Municipios -->
  <div class="section-label mt-16">Segmentación por Municipio GMAIL</div>
  
  <button id="btn-cc" class="btn btn-municipality btn-cancun" onclick="procesarIndividual('CANCUN')">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#f43f5e">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
    </svg>
    Procesar Facturas Cancún
  </button>

  <button id="btn-py" class="btn btn-municipality btn-playa" onclick="procesarIndividual('PLAYA')">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#10b981">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v18m0-18l4 4m-4-4L8 7m8 14H8m8-5H8M8 11h8" />
    </svg>
    Procesar Facturas Playa
  </button>

  <button id="btn-tl" class="btn btn-municipality btn-tulum" onclick="procesarIndividual('TULUM')">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#06b6d4">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-.778.099-1.533.284-2.253" />
    </svg>
    Procesar Facturas Tulum
  </button>

  <!-- Loader -->
  <div id="loader" class="loader-container">
    <div class="spinner"></div>
    <div id="loader-msg" class="loader-text">Conectando con el servidor...</div>
    <div id="progress-container" class="progress-bar-container">
      <div id="progress-bar" class="progress-bar-fill"></div>
    </div>
  </div>

  <!-- Modal de Confirmación -->
  <div id="modal-confirm" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title" id="confirm-title">¿Confirmar Acción?</div>
      <div class="modal-desc" id="confirm-desc">Descripción de la acción a ejecutar.</div>
      <div class="modal-actions">
        <button class="modal-btn" onclick="cerrarConfirm(false)">Cancelar</button>
        <button class="modal-btn modal-btn-primary" onclick="cerrarConfirm(true)">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- Modal de Alerta -->
  <div id="modal-alert" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title" id="alert-title">Consola de Notificación</div>
      <div class="modal-desc" id="alert-desc">Mensaje recibido del servidor.</div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-primary" onclick="cerrarAlerta()">Entendido</button>
      </div>
    </div>
  </div>

  <script>
    // Configuración Inicial del Tema de Color
    (function initTheme() {
      const savedTheme = localStorage.getItem('console-theme') || 'dark';
      if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
      }
    })();

    function toggleTheme() {
      const isCurrentlyLight = document.body.classList.toggle('light-theme');
      localStorage.setItem('console-theme', isCurrentlyLight ? 'light' : 'dark');
    }

    // Callbacks dinámicos para modales
    let confirmCallback = null;

    function abrirConfirm(titulo, descripcion, callback) {
      document.getElementById('confirm-title').innerText = titulo;
      document.getElementById('confirm-desc').innerText = descripcion;
      document.getElementById('modal-confirm').style.display = 'flex';
      confirmCallback = callback;
    }

    function cerrarConfirm(aceptado) {
      document.getElementById('modal-confirm').style.display = 'none';
      if (aceptado && confirmCallback) {
        confirmCallback();
      }
      confirmCallback = null;
    }

    function abrirAlerta(titulo, mensaje) {
      document.getElementById('alert-title').innerText = titulo;
      document.getElementById('alert-desc').innerText = mensaje;
      document.getElementById('modal-alert').style.display = 'flex';
    }

    function cerrarAlerta() {
      document.getElementById('modal-alert').style.display = 'none';
    }

    // Funciones del Ciclo de UI
    function bloquearInterfaz(mensaje) {
      document.getElementById('btn-legacy').disabled = true;
      document.getElementById('btn-backfill').disabled = true;
      document.getElementById('btn-todo').disabled = true;
      document.getElementById('btn-cc').disabled = true;
      document.getElementById('btn-py').disabled = true;
      document.getElementById('btn-tl').disabled = true;
      document.getElementById('loader-msg').innerText = mensaje;
      document.getElementById('loader').style.display = 'flex';
    }

    // Desbloqueo seguro de la botonera lateral
    function desbloquearInterfaz() {
      document.getElementById('btn-legacy').disabled = false;
      document.getElementById('btn-backfill').disabled = false;
      document.getElementById('btn-todo').disabled = false;
      document.getElementById('btn-cc').disabled = false;
      document.getElementById('btn-py').disabled = false;
      document.getElementById('btn-tl').disabled = false;
      document.getElementById('loader').style.display = 'none';
      document.getElementById('progress-container').style.display = 'none';
    }

    // Handlers de Acciones del Menú
    function confirmarOrganizacion() {
      abrirConfirm(
        '¿Confirmas la acción?', 
        'Deseas iniciar el escaneo, mapeo OCR y renombrado de la carpeta antigua de archivos descargados. Este proceso puede demorar unos minutos.',
        function() {
          ejecutarOrganizacionHistorica();
        }
      );
    }

    function ejecutarOrganizacionHistorica() {
      bloquearInterfaz('Analizando archivos sueltos en Drive, emparejando XMLs con PDFs mediante metadatos y aplicando estructura cronológica corporativa...');
      google.script.run
        .withSuccessHandler(function(response) {
          desbloquearInterfaz();
          abrirAlerta('Operación Finalizada', response.mensaje);
        })
        .withFailureHandler(function(err) {
          desbloquearInterfaz();
          abrirAlerta('Error de Ejecución', 'Error crítico: ' + err);
        })
        .apiOrganizarCarpetaDescargados();
    }

    // Confirmación y lanzamiento del backfill histórico de clave catastral, fechas y referencias
    function confirmarBackfill() {
      abrirConfirm(
        '¿Confirmar Enriquecimiento?', 
        'Deseas analizar las facturas registradas en las hojas contables. Se escanearán aquellas que no tengan Clave Catastral, Fecha Límite Pago o Referencia Bancaria, se recuperará su PDF de Drive mediante OCR y se actualizará su información.',
        function() {
          ejecutarBackfill();
        }
      );
    }

    // Variables globales de progreso para el Backfill por lotes
    let totalPendientesGlobal = 0;
    let procesadosGlobal = 0;
    let actualizadosGlobal = 0;
    let hojaActualDisplay = 'Iniciando';

    function ejecutarBackfill() {
      bloquearInterfaz('Contabilizando registros pendientes en las hojas de cálculo...');
      document.getElementById('progress-container').style.display = 'none';
      document.getElementById('progress-bar').style.width = '0%';
      hojaActualDisplay = 'Escaneando hojas contables';
      
      google.script.run
         .withSuccessHandler(function(response) {
          if (response.totalPendientes === 0) {
            desbloquearInterfaz();
            abrirAlerta('Operación Finalizada', 'No se encontraron registros pendientes con datos vacíos o "N/A".');
            return;
          }
          
          totalPendientesGlobal = response.totalPendientes;
          procesadosGlobal = 0;
          actualizadosGlobal = 0;
          
          document.getElementById('progress-container').style.display = 'block';
          procesarSiguienteLoteBackfill();
        })
        .withFailureHandler(function(err) {
          desbloquearInterfaz();
          abrirAlerta('Error de Inicialización', 'No se pudo obtener la cantidad de pendientes: ' + err);
        })
        .apiObtenerMetricasBackfill();
    }

    function procesarSiguienteLoteBackfill() {
      let porcentaje = Math.min(100, Math.round((procesadosGlobal / totalPendientesGlobal) * 100));
      document.getElementById('progress-bar').style.width = porcentaje + '%';
      
      let msg = 'Enriqueciendo claves, fechas y referencias...\n' + 
                '📍 Última pestaña: ' + hojaActualDisplay + '\n' +
                'Progreso: ' + procesadosGlobal + ' de ' + totalPendientesGlobal + ' (' + porcentaje + '%)\n' +
                'Actualizadas: ' + actualizadosGlobal;
      
      document.getElementById('loader-msg').innerText = msg;
      
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result.exito) {
            desbloquearInterfaz();
            abrirAlerta('Error en Lote', 'Fallo al procesar el lote: ' + result.mensaje);
            return;
          }
          
          procesadosGlobal += result.procesadosEnLote;
          actualizadosGlobal += result.actualizadosEnLote;
          if (result.hojaActual) {
            hojaActualDisplay = result.hojaActual;
          }
          
          if (result.completado || result.restantes === 0 || result.procesadosEnLote === 0) {
            document.getElementById('progress-bar').style.width = '100%';
            desbloquearInterfaz();
            abrirAlerta(
              'Enriquecimiento Completado', 
              'Se han analizado todos los registros pendientes.\n\n' +
              '✅ Registros procesados y actualizados con éxito.'
            );
          } else {
            procesarSiguienteLoteBackfill();
          }
        })
        .withFailureHandler(function(err) {
          desbloquearInterfaz();
          abrirAlerta('Error de Ejecución', 'Se interrumpió la conexión: ' + err);
        })
        .apiProcesarLoteBackfill();
    }

    function procesarTodo() {
      bloquearInterfaz('Escaneando todas las etiquetas de Gmail y ejecutando conversión OCR masiva...');
      google.script.run
        .withSuccessHandler(function(response) { 
          desbloquearInterfaz(); 
          abrirAlerta('Proceso Exitoso', response.mensaje); 
        })
        .withFailureHandler(function(err) { 
          desbloquearInterfaz(); 
          abrirAlerta('Fallo de Red', 'Error de red: ' + err); 
        })
        .apiProcesarTodo();
    }

    function procesarIndividual(municipio) {
      bloquearInterfaz('Procesando cola de correos para ' + municipio + '...');
      google.script.run
        .withSuccessHandler(function(response) { 
          desbloquearInterfaz(); 
          abrirAlerta('Proceso Completado', response.mensaje); 
        })
        .withFailureHandler(function(err) { 
          desbloquearInterfaz(); 
          abrirAlerta('Error del Servidor', 'Error de red: ' + err); 
        })
        .apiProcesarMunicipio(municipio);
    }
  </script>
